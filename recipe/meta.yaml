{% set name = "pytest-lazy-fixture" %}
{% set version = "0.6.3" %}
{% set hash = "0e7d0c7f74ba33e6e80905e9bfd81f9d15ef9a790de97993e34213deb5ad10ac" %}
package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ hash }}

build:
  noarch: python
  number: 1
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools

  run:
    - python >={{ python_min }}
    - pytest >=3.2.5

test:
  imports:
    - pytest_lazyfixture
  requires:
    - pytest
    - python {{ python_min }}
  commands:
    - pytest {{ RECIPE_DIR }}/test.py

about:
  home: https://github.com/TvoroG/pytest-lazy-fixture
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'It helps to use fixtures in pytest.mark.parametrize'
  dev_url: https://github.com/TvoroG/pytest-lazy-fixture

extra:
  recipe-maintainers:
    - nicoddemus
    - TvoroG
